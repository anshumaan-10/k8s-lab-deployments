kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-security-lab
nodes:
- role: control-plane
  extraPortMappings:
  # phoenix-app (NodePort 30080 → container port 8080)
  - containerPort: 30080
    hostPort: 8080
    protocol: TCP
  # ArgoCD UI (NodePort 30443)
  - containerPort: 30443
    hostPort: 8443
    protocol: TCP
