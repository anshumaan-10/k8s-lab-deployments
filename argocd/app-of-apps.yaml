# App-of-Apps — deploys all three application ArgoCD Applications
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab-apps
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/anshumaan-10/k8s-lab-deployments
    targetRevision: main
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
