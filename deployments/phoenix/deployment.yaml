apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-app
  namespace: web
  labels:
    app: phoenix-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phoenix-app
  template:
    metadata:
      labels:
        app: phoenix-app
    spec:
      serviceAccountName: phoenix-sa
      # ─────────────────────────────────────────────────────────────
      # VULN-01: hostPID + hostNetwork + hostPath:/ + privileged
      # These four flags together allow full node escape as root.
      # See: vulnerabilities/VULN-01-privileged-pod in k8s-security-lab
      # Fix: vulnerabilities/VULN-01-privileged-pod/artifacts/fix-phoenix-securitycontext.yaml
      # ─────────────────────────────────────────────────────────────
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: phoenix-app
        image: anshumaan10/phoenix:1d8e1f9e7f1910eaa5a0a13035b8f9402ef1ed26
        ports:
        - containerPort: 8080
          hostPort: 8080
        env:
        - name: DEBUG_PATH
          valueFrom:
            configMapKeyRef:
              name: phoenix-config
              key: DEBUG_PATH
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          privileged: true   # VULN-01: remove this
        volumeMounts:
        - name: host-root
          mountPath: /host   # VULN-01: remove this volume mount
      volumes:
      - name: host-root
        hostPath:
          path: /            # VULN-01: remove this volume
